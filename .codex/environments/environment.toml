[commands]
openwolf-status = "rtk openwolf status"
openwolf-scan = "rtk openwolf scan --check"
codegraph-status = "rtk codegraph status ."
crg-status = "rtk code-review-graph status --repo ."
openspec-validate = "rtk openspec validate --changes --strict"
app-runner = "rtk ./script/build_and_run.sh"
app-smoke-test = "rtk bash script/build_and_run.sh --smoke-test"
shell-checks = "rtk swift run ScreenMemShellChecks"
